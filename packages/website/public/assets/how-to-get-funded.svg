<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>How to get funded — THESIS submission requirements</title>
  <desc>A card summarising what an X post and its token must satisfy for the THESIS committee to review and fund it.</desc>
  <defs>
    <style><![CDATA[
      .bg { fill: #080A10; }
      .panel { fill: #11151F; stroke: #232B3A; stroke-width: 1; }
      .accent { fill: #E6A33E; }
      .text { fill: #EAEEF6; font-family: "Segoe UI", -apple-system, Helvetica, Arial, sans-serif; }
      .muted { fill: #8B97AC; font-family: "Segoe UI", -apple-system, Helvetica, Arial, sans-serif; }
      .dim { fill: #5C6678; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .green { fill: #3FB984; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .serif { font-family: Georgia, serif; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1200" height="675" class="bg"/>

  <text x="60" y="80" class="dim mono" font-size="14" letter-spacing="3">THE COMMITTEE · SUBMISSION RULES</text>
  <text x="60" y="148" class="text" font-size="56" font-weight="600">How to get funded</text>
  <text x="60" y="190" class="muted" font-size="20">Two simple gates. Pass both and the committee reads your thesis.</text>

  <rect x="60" y="240" width="525" height="340" rx="14" class="panel"/>
  <text x="92" y="290" class="dim mono" font-size="13" letter-spacing="2">01 / YOUR POST</text>
  <text x="92" y="328" class="accent serif" font-size="28" font-weight="700">What you write</text>

  <circle cx="105" cy="370" r="4" class="accent"/>
  <text x="125" y="376" class="text" font-size="17">Tag <tspan class="accent" font-weight="600">@thesis_agent</tspan></text>

  <circle cx="105" cy="402" r="4" class="accent"/>
  <text x="125" y="408" class="text" font-size="17">Include the Base contract address (<tspan class="mono">0x…</tspan>)</text>

  <circle cx="105" cy="434" r="4" class="accent"/>
  <text x="125" y="440" class="text" font-size="17">At least <tspan class="accent" font-weight="600">6 words</tspan> of actual analysis</text>

  <circle cx="105" cy="466" r="4" class="accent"/>
  <text x="125" y="472" class="text" font-size="17">Your account has <tspan class="accent" font-weight="600">50+ followers</tspan></text>

  <circle cx="105" cy="498" r="4" class="accent"/>
  <text x="125" y="504" class="text" font-size="17">One thesis per <tspan class="accent" font-weight="600">45 minutes</tspan> per account</text>

  <circle cx="105" cy="530" r="4" class="accent"/>
  <text x="125" y="536" class="text" font-size="17">Same token retryable after <tspan class="accent" font-weight="600">2 hours</tspan></text>

  <rect x="615" y="240" width="525" height="340" rx="14" class="panel"/>
  <text x="647" y="290" class="dim mono" font-size="13" letter-spacing="2">02 / THE TOKEN</text>
  <text x="647" y="328" class="accent serif" font-size="28" font-weight="700">What the token must be</text>

  <circle cx="660" cy="370" r="4" class="green"/>
  <text x="680" y="376" class="text" font-size="17">Launched on <tspan class="green" font-weight="600">Clanker</tspan> or <tspan class="green" font-weight="600">Bankr</tspan></text>

  <circle cx="660" cy="402" r="4" class="green"/>
  <text x="680" y="408" class="text" font-size="17">Older than <tspan class="green" font-weight="600">1 hour</tspan></text>

  <circle cx="660" cy="434" r="4" class="green"/>
  <text x="680" y="440" class="text" font-size="17">Market cap between <tspan class="green" font-weight="600">$40K</tspan> and <tspan class="green" font-weight="600">$3M</tspan></text>

  <circle cx="660" cy="466" r="4" class="green"/>
  <text x="680" y="472" class="text" font-size="17">Live on <tspan class="green" font-weight="600">Base</tspan> chain</text>

  <circle cx="660" cy="498" r="4" class="green"/>
  <text x="680" y="504" class="text" font-size="17">Liquidity holding, not draining</text>

  <text x="60" y="625" class="muted" font-size="16" font-style="italic">The Dean grades on substance — narrative, onchain signals, risk awareness.</text>
  <text x="60" y="650" class="dim mono" font-size="13" letter-spacing="1">thesisonbase.com  ·  @thesisonbase</text>
</svg>
