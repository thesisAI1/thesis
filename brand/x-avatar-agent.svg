<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.78">
      <stop offset="0" stop-color="#1B2330"/>
      <stop offset="1" stop-color="#070910"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#4F9DDE" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#4F9DDE" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)" />
  <rect width="400" height="400" fill="url(#glow)" />

  <g filter="url(#soft)">
    <ellipse cx="200" cy="200" rx="77" ry="105" fill="none" stroke="#4F9DDE" stroke-width="27" />
    <rect x="140" y="186.5" width="120" height="27" rx="13.5" fill="#4F9DDE" />
  </g>
</svg>
